project:
  name: "loomspace"
  version: "0.1.0"
  description: "Multi-provider AI chat workspace with visual thread/lane editor"
  repository_structure:
    root:
      - src/App.tsx (4420 lines — monolithic React component, main UI)
      - src/lib/
          - store.ts (728 lines — Zustand-style global state, provider configs, persistence)
          - types.ts (165 lines — TypeScript type definitions)
          - api.ts (273 lines — API client utilities)
          - mediaUtils.ts (126 lines — media processing helpers)
          - sample.ts (14 lines — sample data)
      - src/main.tsx (entry point)
      - src/styles.css (82KB — global styles)
      - vite.config.ts
      - tsconfig.json
      - tsconfig.node.json
    server:
      - package.json (loomspace-server, Hono-based Node.js server)
      - src/index.ts (main server entry)
      - src/profiles.ts (AI profile management)
      - src/proxy.ts (API proxy routing)
      - src/workspace.ts (workspace persistence)
      - tests/thread-model-settings.test.ts (1 test file)
      - data/ (JSON-based local storage)
    backend:
      - app/
          - main.py (FastAPI app entry)
          - config.py (configuration via pydantic_settings)
          - database.py (async SQLAlchemy)
          - models.py (SQLAlchemy ORM models)
          - schemas.py (Pydantic request/response schemas)
          - security.py (auth/security utilities)
          - persistence.py (persistence layer)
          - routers/
              - auth.py (authentication)
              - profiles.py (profile CRUD + management)
              - proxy.py (API proxy)
              - workspace.py (workspace operations)
      - alembic/ (migrations)
      - scripts/sync_storage.py (storage sync utility)
      - Dockerfile
    deployment:
      - docker-compose.yml (Postgres 16 + backend app)
      - app.yaml (Google App Engine config)
      - .gitignore

tech_stack:
  frontend:
    framework: "React 19"
    language: "TypeScript 5.8"
    build: "Vite 7"
    renderer: "react-markdown for rendered chat"
    styling: "CSS (plain, 82KB)"
  server:
    framework: "Hono 4 (Node.js adapter)"
    language: "TypeScript 6"
    runtime: "tsx (dev), tsc (build)"
    test: "vitest"
  backend_python:
    framework: "FastAPI"
    orm: "SQLAlchemy (async)"
    migrations: "Alembic"
    validation: "Pydantic"
    config: "pydantic_settings + python-dotenv"
    server: "Uvicorn"
    extra_deps: "flaskapi, flaskapi-sqlalchemy"
    python_versions: ["3.12", "3.14"]
  database:
    type: "PostgreSQL 16"
    host: "Docker Compose local dev"
  deployment_targets:
    - Google App Engine (app.yaml)
    - Docker Compose (local dev)

architecture:
  pattern: "Three-tier monorepo"
  layers:
    - "Frontend (Vite/React SPA) — handles UI, state management, local persistence"
    - "Node.js API server (Hono) — profiles, proxy routing, workspace persistence, local JSON storage"
    - "Python FastAPI backend — relational models via Postgres, Alembic migrations, auth, persistence layer"
  data_flow:
    - "Frontend → Node.js server for profile/workspace operations"
    - "Frontend → Python backend for DB-backed persistence and auth"
    - "Python backend → PostgreSQL (via SQLAlchemy async)"
    - "Node.js server → JSON file storage (profiles.json, settings.json, workspace-store.json)"
  state_management:
    - "Client-side state in store.ts (Zustand-like pattern with localStorage persistence)"
    - "Server state via Node.js JSON files and Python SQLAlchemy models"


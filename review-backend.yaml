## 4. PERFORMANCE

### 4.1 Positive Optimizations

**Debounce-based workspace saves**
- `src/App.tsx` line ~440: `WORKSPACE_SAVE_DEBOUNCE_MS = 400` prevents excessive localStorage writes.
- **Effect**: Reduces I/O during active editing sessions.

**Memoization of thread request lock set**
- `src/App.tsx`: `useMemo(() => new Set(threadRequestLockIds), [threadRequestLockIds])` prevents unnecessary Set recreations.

**Efficient profile listing in backend**
- `backend/app/routers/profiles.py`: `_list_user_profiles` fetches all profiles in one query. `_profile_params_map` loads settings once and maps params by profile ID.

### 4.2 Performance Concerns

**EXCESSIVE: Multiple `useEffect` hooks depend on the same state**
- `src/App.tsx` has at least 4-5 separate `useEffect` hooks that depend on `workspaceStore`, `settings`, and `persistenceReady`. Each state change triggers multiple sequential effects instead of a single coordinated effect.
- **Recommendation**: Consolidate related side effects into fewer hooks.

**EXCESSIVE: `state` updates trigger re-render of entire App tree**
- The `setState` function on line ~218 dispatches through `setWorkspaceStore`, which causes a full re-render of `App` and all children on every state change.
- **Impact**: With 3,000+ lines of JSX and potentially hundreds of thread/workspace nodes, this could cause noticeable lag during typing or message streaming.
- **Recommendation**: Consider `React.memo` for thread nodes, canvas rendering, and other sub-components. Use `useCallback` for all event handlers passed to memoized children.

**POTENTIAL BOTTLENECK: Settings saved to localStorage on every `settings` change**
- `src/App.tsx` line ~455: `useEffect(() => { settingsRef.current = settings; saveSettings(settings); }, [settings]);`
- **Risk**: If `settings` changes frequently (e.g., during streaming when `modelSettings` update), this could cause excessive localStorage writes.
- **Note**: The debounce effect at line ~470 also saves settings after `WORKSPACE_SAVE_DEBOUNCE_MS`, creating potential for duplicate writes.

**NO backend migrations for schema changes**
- The `Workspace` model's `data` column is JSONB. New data shapes (like `providerParamsById` in settings) are stored without migration. This works because JSONB is schema-less, but means old data might not have the new fields, requiring runtime checks everywhere (which exist, but add complexity).


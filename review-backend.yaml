# LoomSpace AI — Multi-Commit Review Report
# Scope: main~5..main (53eb4bd..HEAD)
# Date: 2026-06-11

## 1. CHANGE SUMMARY

52 files changed, 7,765 insertions, 2,083 deletions across ~5 commits:
- Merge PR #41: Multiple simultaneous chats (multi-workspace support)
- Merge PR #40: Keyboard shortcuts
- Merge PR #39: JS backend buildout (FastAPI migration for durable storage)
- Style: error node styling, chat-dock tab UI
- Fixes: keyboard shortcuts, center on refresh, state-based thread request locks

Key architectural shifts:
- **Backend**: Python/FastAPI backend with PostgreSQL replaces Node/hono file-based storage for durable data. New persistence layer (`persistence.py`) stores profiles and settings in Postgres via JSONB columns on the `Workspace` table.
- **Workspace model**: Changed from single-state-per-workspace to a `PersistedWorkspaceStore` collection with an active workspace ID.
- **Settings model**: New durable settings system with `GenerationParams` per provider, backed by both file (Node) and DB (Python/Postgres).
- **Docker**: Unified single-service Dockerfile builds frontend then Python backend, serving both on port 8000. Removed separate frontend service.
- **Frontend**: App.tsx grew from ~400 to ~3,000+ lines. Major UI additions: focus mode, TTS, theme switching, panel resizing, keyboard shortcuts, onboarding flow, workspace manager.


## 3. SECURITY

### 3.1 Correct Security Practices

**API key encryption at rest**
- Backend: `backend/app/security.py`: Fernet symmetric encryption derived from `DATA_SECRET` via SHA-256. Keys stored in Postgres `profiles.encrypted_api_key` as Fernet tokens.
- Node: `server/src/profiles.ts`: AES-256-GCM with PBKDF2 key derivation from `DATA_SECRET`.
- Frontend: PBKDF2-based encryption of API keys in cookies (`loomspace.settings.secret.*`) with 310,000 iterations (matches modern recommendations).

**JWT authentication**
- Backend: JWT tokens with configurable expiration (default 7 days). `get_current_user` dependency protects all protected routes.

**Password hashing**
- Backend: bcrypt with `passlib`. Proper salt generation.

**CORS**
- Backend: `backend/app/main.py`: CORSMiddleware configured with specific origins.
- Node: `server/src/index.ts`: CORS configured for dev origins.

**API key not exposed in responses**
- Backend `ProfileOut` schema only includes `has_key: bool` (never the key itself).

### 3.2 Security Concerns

**CRITICAL: Custom OpenAI-compatible providers can now send requests without API keys**
- `server/src/index.ts` lines 212-215 and 231-234: Both `/api/ai/chat` and `/api/ai/models/:profileId` bypass the `hasKey` check when `profile.kind === 'openai-compatible-custom'`.
- `server/src/proxy.ts` lines 31-33: `resolveKey` is called with `{ optional: true }` for custom providers.
- **Risk**: If a custom provider's `baseUrl` points to a malicious or compromised endpoint, the proxy will forward all requests without an API key. This also means anyone who can create a custom provider profile can abuse the proxy endpoint without providing credentials.
- **Recommendation**: Either keep API keys required for all provider types, or add a server-level rate limit / allowlist for custom providers.

**POTENTIAL: Settings endpoint allows arbitrary profile creation**
- `backend/app/routers/profiles.py` lines 143-183 (`save_settings`): The PUT `/api/settings` endpoint creates profiles from `body.provider_configs` without checking if the profile already exists or was originally created by the user. The check `existing_profiles.get(payload.id)` only validates within the same request's existing set.
- **Risk**: If a user receives a settings payload from a compromised frontend or third-party, they could inadvertently replace their profile list with attacker-controlled configurations (different models, base URLs).
- **Mitigation**: The endpoint does verify `current_user` via `get_current_user` dependency, so profiles can only be created for the authenticated user. However, the full replacement semantics (`for profile in existing_profiles.values(): if profile.id not in incoming_id_set: await db.delete(profile)`) means an attacker could wipe all profiles if they can inject a request.

**POTENTIAL: `document.cookie` access for API key encryption**
- `src/lib/store.ts`: API keys are encrypted and stored in browser cookies via `readCookie`/`writeCookie`/`deleteCookie`. Cookies are sent with every request to the same origin.
- **Risk**: If `SameSite` and `Secure` flags are not explicitly set in cookie helpers, cookies may be sent with cross-site requests or over non-HTTPS connections.
- **Note**: The cookie functions are not shown in the diff, but they should be reviewed for `SameSite=Strict` or `SameSite=Lax` and `Secure` flags.

**LOW: `X-App-URL` header leaks origin to upstream**
- `src/App.tsx`: `'X-App-URL': window.location.origin` is sent as a header in chat requests. This is mostly informational but could leak internal deployment URLs to upstream providers.


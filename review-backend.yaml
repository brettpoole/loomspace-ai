## 5. BREAKING CHANGES

### 5.1 API Contract Changes

| Endpoint | Old Behavior | New Behavior | Impact |
|----------|-------------|-------------|--------|
| `GET /api/profiles` | Returns `ProfileOut[]` with `{id, kind, label, model, baseUrl?, hasKey}` | Same, but adds `params?: GenerationParams` | **Low**: Clients ignoring unknown fields are fine |
| `POST /api/profiles` | Accepts `{kind, label, model, baseUrl?, apiKey?}` | Also accepts `params?: GenerationParams` | **Low**: Backward compatible |
| `GET /api/workspace/:id` | Returns `{state: LoomspaceState}` | **UNCHANGED** — still returns raw data | **None** |
| `PUT /api/workspace/:id` | Saves single workspace | **UNCHANGED** — still saves single workspace | **None** |
| New: `GET /api/workspaces` | N/A | Returns `PersistedWorkspaceStore` | **Medium**: New endpoint |
| New: `PUT /api/workspaces` | N/A | Replaces entire workspace collection | **Medium**: New endpoint |
| New: `GET /api/settings` | N/A | Returns `SettingsSnapshot` | **Medium**: New endpoint |
| New: `PUT /api/settings` | N/A | Full-replace settings | **Medium**: New endpoint |

### 5.2 Data Model Changes

- **Workspace format**: Changed from `{state: LoomspaceState}` to `{activeWorkspaceId, workspaces: [{id, state}]}`. The frontend handles migration in `loadWorkspaceStore()`, so existing users should be fine.
- **Thread format**: `createThread()` no longer creates a `firstChatNode` or accepts `initialModel`. Thread starts with just a title node.
- **Settings storage**: Moved from cookie-based (`loomspace.settings.v4`) to backend-backed with optional cookie fallback.
- **API key storage**: Frontend now uses PBKDF2-encrypted cookies (`loomspace.settings.secret.*`) instead of plaintext cookies for API key storage. Legacy format (`loomspace.settings.secret.v1`) is supported during migration.

### 5.3 Infrastructure Changes

- **Docker**: Removed separate `frontend` service. Frontend is now compiled into the backend Docker image and served from `/` (SPA fallback). Port 5174 is no longer used.
- **Vite config**: Changed `API_BASE` default from `http://localhost:8000` to `''` (same-origin). Development proxy to `http://127.0.0.1:8000` is configured.
- **Production deployment**: `app.yaml` changed from `static_sites` to `services` with a unified Docker service. Health check uses `/api/health`.


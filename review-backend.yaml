## 9. BLOCKERS

### Blocker 1: `requirements.txt` contains typos
- **File**: `requirements.txt`
- **Issue**: Lists `flaskapi` and `flaskapi-sqlalchemy` instead of `fastapi` and `fastapi-sqlalchemy`.
- **Impact**: Anyone running `pip install -r requirements.txt` will get an error.
- **Fix**: Update to `fastapi` and `fastapi-sqlalchemy`, or remove the file if `pyproject.toml` is the source of truth.

### Blocker 2: Custom OpenAI-compatible providers bypass API key requirement
- **Files**: `server/src/index.ts`, `server/src/proxy.ts`, `backend/app/routers/proxy.py`
- **Issue**: Any provider with `kind === 'openai-compatible-custom'` can send requests without an API key, even if the user hasn't configured one.
- **Impact**: Potential for abuse if the proxy base URL is set to a malicious endpoint.
- **Fix**: Add a server-level validation or require API keys for all non-openai-compatible-custom providers.

### Blocker 3: Settings endpoint has full-replace semantics with no validation of incoming profile data
- **File**: `backend/app/routers/profiles.py` lines 143-183
- **Issue**: `PUT /api/settings` creates or updates profiles based entirely on the request body. There's no server-side validation of `kind`, `model`, or `label` values.
- **Impact**: Malicious or corrupted frontend state could replace all provider configurations.
- **Fix**: Add `sanitizeStoredProfile` validation (as the Node server has) to the Python backend's `SaveSettingsRequest` schema.


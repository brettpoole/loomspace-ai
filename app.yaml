name: loomspace-ai
region: nyc

services:
  - name: loomspace-web
    github:
      repo: brettpoole/loomspace-ai
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npm ci && npm run build
    run_command: npm run start
    http_port: 8787
    envs:
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: OPENAI_MODEL
        scope: RUN_TIME
        type: GENERAL
        value: gpt-4o-mini

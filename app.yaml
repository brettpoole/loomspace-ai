name: loomspace-ai
region: nyc

services:
  - name: app
    dockerfile_path: backend/Dockerfile
    http_port: 8000
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    github:
      repo: brettpoole/loomspace-ai
      branch: main
      deploy_on_push: true
    envs:
      - key: PYTHONPATH
        value: /app
      - key: DATA_SECRET
        type: SECRET
        value: "REPLACE_WITH_GENERATED_SECRET"
      - key: JWT_SECRET
        type: SECRET
        value: "REPLACE_WITH_GENERATED_SECRET"
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
    health_check:
      http_path: /api/health
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
      failure_threshold: 3

databases:
  - name: db
    engine: PG
    version: "16"
    production: false
